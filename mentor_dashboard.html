<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Mentor Dashboard - Edex Habit Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <style>
    :root {
      --neon-green: #ccff00;
      --dark-card: #111111;
      --bg-page: #f4f5f7;
    }

    body {
      background: var(--bg-page);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .mentor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      border-bottom: none;
      background: var(--dark-card);
      border-radius: 16px;
      margin-top: 1.5rem;
      margin-bottom: 3rem;
      flex-wrap: wrap;
      gap: 1.5rem;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .mentor-avatar {
      width: 56px;
      height: 56px;
      background: var(--neon-green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
    }

    .header-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin: 0 0 4px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-subtitle {
      font-size: 0.9rem;
      color: #9ca3af;
      margin: 0;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn-outline-purple, .btn-outline-blue, .btn-outline-red {
      background: var(--neon-green);
      border: none;
      color: #000;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-outline-purple:hover, .btn-outline-blue:hover, .btn-outline-red:hover {
      background: #b3e600;
    }

    @media (max-width: 768px) {
      .mentor-header {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 1.5rem !important;
      }

      .header-actions {
        width: 100% !important;
        flex-wrap: wrap !important;
        gap: 8px !important;
        justify-content: flex-start !important;
      }

      .header-actions a,
      .header-actions button {
        flex: 1 1 auto !important;
        justify-content: center !important;
        padding: 8px 12px !important;
        font-size: 0.85rem !important;
      }
    }

    .review-card {
      background: var(--dark-card);
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 550px;
      margin: 0 auto;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      position: relative;
      overflow: hidden;
    }

    .review-card::before {
      display: none;
    }

    .review-card-content {
      position: relative;
      z-index: 1;
    }

    .card-header-flex {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 2rem;
    }

    .icon-container {
      width: 48px;
      height: 48px;
      background: #222;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--neon-green);
    }

    .card-title-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin: 0;
    }

    .gradient-line {
      height: 4px;
      width: 48px;
      background: var(--neon-green);
      border-radius: 2px;
    }

    .form-group-custom {
      margin-bottom: 1.5rem;
    }

    .form-label-custom {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #9ca3af;
      margin-bottom: 10px;
    }

    .form-label-custom svg {
      stroke: var(--neon-green);
    }

    .form-input-custom {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #333;
      border-radius: 8px;
      font-size: 1rem;
      color: #fff;
      background: #111;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }

    .form-input-custom:focus {
      border-color: var(--neon-green);
      box-shadow: 0 0 0 3px rgba(204, 255, 0, 0.1);
      background: #111;
    }

    .form-input-custom option {
        background: #111;
        color: #fff;
    }

    .btn-gradient {
      width: 100%;
      background: var(--neon-green);
      color: #000;
      border: none;
      padding: 16px;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 2rem;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn-gradient:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    /* Table styles */
    .table {
      width: 100%;
      border-collapse: collapse;
    }
    .table th {
      background: transparent;
      border-bottom: 1px solid #333;
      color: var(--neon-green);
      padding: 12px 0;
      font-weight: 600;
    }
    .table td {
      padding: 16px 0;
      border-bottom: 1px solid #222;
      color: #fff;
    }
    .badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge-present { background: #15803d; color: #fff; }
    .badge-late { background: #b45309; color: #fff; }
    .badge-absent { background: #dc2626; color: #fff; }
    .badge-none { background: #333; color: #999; }
    
    @media (max-width: 768px) {
      .hide-on-pc { display: block; }
      .table-responsive-mobile { display: block; width: 100%; overflow-x: hidden; }
      .table-responsive-mobile thead { display: none; }
      .table-responsive-mobile tbody { display: block; width: 100%; }
      .table-responsive-mobile tr { display: flex; flex-direction: column; margin-bottom: 1rem; padding: 1rem; border: 1px solid #333; border-radius: 12px; background: transparent; }
      .table-responsive-mobile td { display: block; width: 100%; padding: 4px 0 !important; text-align: left !important; border: none !important; }
      .student-name-mobile { font-size: 1.1rem; margin-bottom: 8px; color: #fff; font-weight: 700 !important; }
      .review-card { max-width: 100%; padding: 1.5rem; }
      .card-header-flex { flex-direction: column; align-items: flex-start; gap: 1rem; }
    }
    @media (min-width: 769px) {
      .hide-on-pc { display: none; }
    }
  </style>
</head>

<body>
  <div id="loader" class="loader" style="display: block;">Loading...</div>

  <div id="appContent" style="display: none;">
    <div class="container" style="max-width: 1100px;">
      <header class="mentor-header">
        <div class="header-left">
          <div class="mentor-avatar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
              <polyline points="10 9 9 9 8 9" />
            </svg>
          </div>
          <div>
            <h1 class="header-title" id="welcomeTitle">Welcome Mentor</h1>
            <p class="header-subtitle">Select a student and date to review</p>
          </div>
        </div>
        <div class="header-actions">
          <a href="leaderboard.html?v=4" class="btn-outline-purple">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M8 21h8M12 17v4M7 4h10M5 4h14c1.1 0 2 .9 2 2v2c0 4.4-3.6 8-8 8s-8-3.6-8-8V6c0-1.1.9-2 2-2z" />
            </svg>
            Leaderboard
          </a>
          <a href="mentor_attendance.html" class="btn-outline-blue">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            Attendance
          </a>
          <button class="btn-outline-red logout-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            Logout
          </button>
        </div>
      </header>

      <main>
        <div class="review-card" style="max-width: 900px;">
          <!-- Dot pattern top right -->
          <svg style="position:absolute; top:24px; right:24px; opacity:0.3; z-index:0;" width="40" height="40"
            viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <circle cx="2" cy="2" r="1.5" fill="#a855f7" />
            <circle cx="14" cy="2" r="1.5" fill="#a855f7" />
            <circle cx="26" cy="2" r="1.5" fill="#a855f7" />
            <circle cx="38" cy="2" r="1.5" fill="#a855f7" />
            <circle cx="2" cy="14" r="1.5" fill="#a855f7" />
            <circle cx="14" cy="14" r="1.5" fill="#a855f7" />
            <circle cx="26" cy="14" r="1.5" fill="#a855f7" />
            <circle cx="38" cy="14" r="1.5" fill="#a855f7" />
            <circle cx="2" cy="26" r="1.5" fill="#a855f7" />
            <circle cx="14" cy="26" r="1.5" fill="#a855f7" />
            <circle cx="26" cy="26" r="1.5" fill="#a855f7" />
            <circle cx="38" cy="26" r="1.5" fill="#a855f7" />
          </svg>

          <div class="review-card-content">
            <div class="card-header-flex" style="justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 20px;">
              <div style="display: flex; gap: 16px; align-items: center;">
                <div class="icon-container">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                    <line x1="16" y1="2" x2="16" y2="6" />
                    <line x1="8" y1="2" x2="8" y2="6" />
                    <line x1="3" y1="10" x2="21" y2="10" />
                    <path d="M8 14h.01" />
                    <path d="M12 14h.01" />
                    <path d="M16 14h.01" />
                    <path d="M8 18h.01" />
                    <path d="M12 18h.01" />
                    <path d="M16 18h.01" />
                  </svg>
                </div>
                <div class="card-title-group">
                  <h2 class="card-title">Student Daily Overview</h2>
                  <div style="display:flex; gap:4px; margin-top:2px;">
                    <div class="gradient-line"></div>
                    <div class="gradient-line" style="width:8px;"></div>
                  </div>
                </div>
              </div>
              
              <div class="form-group-custom" style="margin-bottom: 0; min-width: 200px;">
                <label class="form-label-custom">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                    <line x1="16" y1="2" x2="16" y2="6" />
                    <line x1="8" y1="2" x2="8" y2="6" />
                    <line x1="3" y1="10" x2="21" y2="10" />
                  </svg>
                  Date to Review
                </label>
                <input type="text" id="dateSelect" class="form-input-custom" style="padding: 10px 14px;">
              </div>
            </div>

            <!-- Search and Filter Bar -->
            <div style="display: flex; gap: 12px; margin-top: 1.5rem; flex-wrap: wrap; align-items: center;">
              <!-- Search -->
              <div style="position: relative; flex: 1; min-width: 200px;">
                <svg style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); pointer-events: none;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="studentSearch" placeholder="Search student name..." oninput="applyFilters()" style="width: 100%; padding: 10px 14px 10px 38px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 0.95rem; outline: none; box-sizing: border-box; font-family: inherit;">
              </div>
              <!-- Attendance Filter -->
              <div style="display: flex; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; overflow: hidden; flex-shrink: 0;">
                <button id="filterAll" onclick="setAttFilter('all')" style="padding: 10px 14px; border: none; background: var(--neon-green); color: #000; font-weight: 600; font-size: 0.85rem; cursor: pointer;">All</button>
                <button id="filterPresent" onclick="setAttFilter('present')" style="padding: 10px 14px; border: none; background: transparent; color: #fff; font-weight: 600; font-size: 0.85rem; cursor: pointer; border-left: 1px solid #333;">Present</button>
                <button id="filterLate" onclick="setAttFilter('late')" style="padding: 10px 14px; border: none; background: transparent; color: #fff; font-weight: 600; font-size: 0.85rem; cursor: pointer; border-left: 1px solid #333;">Late</button>
                <button id="filterAbsent" onclick="setAttFilter('absent')" style="padding: 10px 14px; border: none; background: transparent; color: #fff; font-weight: 600; font-size: 0.85rem; cursor: pointer; border-left: 1px solid #333;">Absent</button>
              </div>
            </div>

            <div style="margin-top: 1rem; overflow-x: auto;">
              <table class="table table-responsive-mobile">
                <thead>
                  <tr>
                    <th>Student Name</th>
                    <th>Attendance</th>
                    <th>Tasks Done</th>
                    <th>Points</th>
                    <th style="text-align: right;">Action</th>
                  </tr>
                </thead>
                <tbody id="studentListBody">
                  <!-- Rendered by JS -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="supabaseClient.js"></script>
  <script src="auth.js"></script>
  <script>
    let studentsData = [];
    let cachedRows = []; // { name, attStatus, html }
    let activeAttFilter = 'all';

    async function init() {
      const authData = await requireAuth('mentor');
      if (!authData) return;

      const title = document.getElementById('welcomeTitle');
      const name = authData.profile.full_name || '';
      const capName = name ? name.charAt(0).toUpperCase() + name.slice(1) : '';
      title.innerHTML = `Welcome Mentor ${capName}`;

      const dateSelect = document.getElementById('dateSelect');

      const { data: students } = await db.from('profiles').select('*').eq('role', 'student').order('full_name');
      studentsData = students || [];

      // Add local timezone offset to show current local day correctly
      const now = new Date();
      const offset = now.getTimezoneOffset() * 60000;
      const localISOTime = (new Date(now - offset)).toISOString().split('T')[0];

      flatpickr(dateSelect, {
        defaultDate: localISOTime,
        dateFormat: "Y-m-d",
        altInput: true,
        altFormat: "d-m-Y",
        disableMobile: true, // Fixes mobile flatpickr UI issues
        onChange: function(selectedDates, dateStr, instance) {
          if(dateStr) {
            loadDashboardData(dateStr);
          }
        }
      });

      await loadDashboardData(localISOTime);

      document.getElementById('loader').style.display = 'none';
      document.getElementById('appContent').style.display = 'block';
    }

    async function loadDashboardData(dateVal) {
      if (!dateVal) return;
      cachedRows = [];
      activeAttFilter = 'all';
      // Reset filter button styles
      ['filterAll', 'filterPresent', 'filterLate', 'filterAbsent'].forEach((id, i) => {
        const btn = document.getElementById(id);
        if (btn) {
          btn.style.background = i === 0 ? 'var(--neon-green)' : 'transparent';
          btn.style.color = i === 0 ? '#000' : '#fff';
        }
      });
      // Clear search
      const searchEl = document.getElementById('studentSearch');
      if (searchEl) searchEl.value = '';

      const tbody = document.getElementById('studentListBody');
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 2rem 0;">Loading data...</td></tr>';

      // 1. Get attendance
      const { data: attendance } = await db.from('attendance').select('*').eq('date', dateVal);
      
      // 2. Get daily logs and task entries
      const { data: logs, error: logsError } = await db.from('daily_logs')
        .select('id, user_id, task_entries(id, content, points_awarded, approved)')
        .eq('log_date', dateVal);

      if (logsError) console.error("Error loading logs:", logsError);

      tbody.innerHTML = '';
      
      if (studentsData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 2rem 0;">No students found.</td></tr>';
        return;
      }

      studentsData.forEach(student => {
        const att = attendance?.find(a => a.user_id === student.id);
        const log = logs?.find(l => l.user_id === student.id);
        
        let tasksDone = 0;
        let points = 0;
        
        if (log && log.task_entries) {
          tasksDone = log.task_entries.filter(t => t.content && t.content.trim() !== '').length;
          points = log.task_entries.reduce((sum, t) => sum + (t.points_awarded || 0), 0);
        }
        
        const attStatus = att ? att.status : 'none';
        let attBadge = '<span class="badge badge-none">Not Marked</span>';
        if (att) {
          if (att.status === 'present') attBadge = '<span class="badge badge-present">Present</span>';
          else if (att.status === 'late') attBadge = '<span class="badge badge-late">Late</span>';
          else if (att.status === 'absent') attBadge = '<span class="badge badge-absent">Absent</span>';
        }

        const rowHtml = `
          <td class="student-name-mobile" style="font-weight: 500;">${(student.full_name || '').toUpperCase()}</td>
          <td><div style="margin-bottom: 4px;" class="hide-on-pc">Attendance:</div>${attBadge}</td>
          <td><div style="margin-bottom: 4px;" class="hide-on-pc">Tasks Done:</div><span style="font-weight:600; color:var(--neon-green);">${tasksDone}</span> / 20</td>
          <td><div style="margin-bottom: 4px;" class="hide-on-pc">Points:</div><span style="font-weight:600; color:var(--neon-green);">${points}</span> pts</td>
          <td style="text-align: right; padding-top: 12px;">
            <button class="btn-gradient" style="display:inline-flex; width:100%; margin-top:0; padding: 10px 16px; font-size: 0.9rem;" onclick="window.openReviewFor('${student.id}', '${dateVal}')">
              Review Diary
            </button>
          </td>
        `;

        cachedRows.push({ name: (student.full_name || '').toLowerCase(), attStatus, html: rowHtml });
      });

      applyFilters();
    }

    window.openReviewFor = function(studentId, dateVal) {
      if (!studentId || !dateVal) return;
      window.location.href = `mentor_review.html?studentId=${studentId}&date=${dateVal}`;
    }

    function setAttFilter(status) {
      activeAttFilter = status;
      const ids = ['filterAll', 'filterPresent', 'filterLate', 'filterAbsent'];
      const vals = ['all', 'present', 'late', 'absent'];
      ids.forEach((id, i) => {
        const btn = document.getElementById(id);
        if (vals[i] === status) {
          btn.style.background = 'var(--neon-green)';
          btn.style.color = '#000';
        } else {
          btn.style.background = 'transparent';
          btn.style.color = '#fff';
        }
      });
      applyFilters();
    }

    function applyFilters() {
      const tbody = document.getElementById('studentListBody');
      const searchVal = (document.getElementById('studentSearch')?.value || '').toLowerCase().trim();

      const filtered = cachedRows.filter(row => {
        const nameMatch = !searchVal || row.name.includes(searchVal);
        const attMatch = activeAttFilter === 'all' || row.attStatus === activeAttFilter;
        return nameMatch && attMatch;
      });

      tbody.innerHTML = '';
      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 2rem 0; color: #9ca3af;">No students match your search/filter.</td></tr>';
        return;
      }
      filtered.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = row.html;
        tbody.appendChild(tr);
      });
    }

    init();
  </script>
  <style>
    @keyframes wave {
      0% {
        transform: rotate(0deg);
      }

      10% {
        transform: rotate(14deg);
      }

      20% {
        transform: rotate(-8deg);
      }

      30% {
        transform: rotate(14deg);
      }

      40% {
        transform: rotate(-4deg);
      }

      50% {
        transform: rotate(10deg);
      }

      60% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(0deg);
      }
    }
  </style>
</body>

</html>

</html>
