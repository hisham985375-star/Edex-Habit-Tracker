<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Edex Habit Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-body">
  <div class="auth-container premium-shadow">
    <div class="text-center mb-4">
      <div style="margin-bottom: 16px;"><img src="logo.png" alt="Edex Life School" style="height: 64px; width: auto; filter: invert(1);"></div>
      <h2 id="portalTitle" style="font-size: 1.75rem; font-weight: 700; color: var(--text-primary);">Password Reset</h2>
      <p id="portalSub" style="color: var(--text-secondary); margin-top: 4px;">Enter your email to receive a password reset link</p>
    </div>

    <form id="forgotForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" class="premium-input" required placeholder="you@example.com">
      </div>
      <div id="errorMsg" class="error-msg" style="padding: 10px; background: #fee2e2; border-radius: 6px; margin-bottom: 12px; display: none; color: #991b1b; font-size: 0.9rem;"></div>
      <div id="successMsg" style="padding: 10px; background: #dcfce7; color: #166534; border-radius: 6px; margin-bottom: 12px; display: none; font-size: 0.9rem;"></div>
      
      <button type="submit" class="btn btn-primary premium-btn mt-4" id="submitBtn">Send Reset Link</button>
    </form>

    <div class="text-center mt-4">
      <p style="font-size: 0.9rem;"><a id="backLink" href="login.html" style="font-weight: 600;">Back to Login</a></p>
    </div>
  </div>

  <script src="supabaseClient.js"></script>
  <script src="auth.js"></script>
  <script>
    redirectIfLoggedIn();

    const urlParams = new URLSearchParams(window.location.search);
    const portal = urlParams.get('portal') || 'student';
    const backLink = document.getElementById('backLink');
    const portalTitle = document.getElementById('portalTitle');
    const portalSub = document.getElementById('portalSub');

    if (portal === 'mentor') {
      backLink.href = 'mentor_login.html';
      backLink.textContent = 'Back to Mentor Login';
      portalTitle.textContent = 'Mentor Password Reset';
      portalSub.textContent = 'Enter your mentor email to receive a password reset link';
    } else {
      backLink.href = 'login.html';
      backLink.textContent = 'Back to Student Login';
      portalTitle.textContent = 'Student Password Reset';
      portalSub.textContent = 'Enter your student email to receive a password reset link';
    }

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      const btn = document.getElementById('submitBtn');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      btn.textContent = 'Sending link...';
      btn.disabled = true;

      // Build the correct redirect URL dynamically
      const currentPath = window.location.href;
      const resetUrl = currentPath.substring(0, currentPath.lastIndexOf('/')) + '/reset_password.html' + `?portal=${portal}`;

      const { data, error } = await db.auth.resetPasswordForEmail(email, {
        redirectTo: resetUrl
      });

      if (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = 'block';
        btn.textContent = 'Send Reset Link';
        btn.disabled = false;
      } else {
        successMsg.textContent = 'Success! We have sent a password reset link to your email. Please check your inbox (and spam folder).';
        successMsg.style.display = 'block';
        btn.textContent = 'Link Sent';
      }
    });
  </script>
</body>
</html>
