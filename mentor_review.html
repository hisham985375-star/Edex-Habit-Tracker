<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Diary - Edex Habit Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <style>
    .date-changer-input {
      background: #ceff00 !important;
      color: #000000 !important;
      border: none !important;
      padding: 10px 16px 10px 36px !important;
      border-radius: 8px !important;
      font-weight: 600 !important;
      font-size: 0.95rem !important;
      cursor: pointer !important;
      width: 100% !important;
      box-sizing: border-box !important;
      font-family: inherit !important;
    }
    .date-changer-input::placeholder { color: #000000 !important; }
    @media (max-width: 768px) {
      #reviewTitle { font-size: 1.6rem !important; word-break: break-word; letter-spacing: -0.5px; margin-top: 8px !important; margin-bottom: 4px !important; }
      .header-subtitle-mobile { font-size: 0.85rem !important; color: #6b7280; }
      .header.container { flex-direction: column !important; align-items: stretch !important; gap: 1.5rem !important; }
      .header-top-row { flex-direction: column !important; align-items: flex-start !important; gap: 12px !important; }
      .header-actions-mobile { flex-direction: column !important; width: 100% !important; align-items: stretch !important; gap: 12px !important; margin-top: 10px !important; }
      .header-actions-mobile > * { width: 100% !important; justify-content: center !important; box-sizing: border-box; }
      .header-actions-mobile a { padding: 12px 16px !important; font-size: 1rem !important; }
      .task-card-header { flex-direction: column !important; align-items: flex-start !important; gap: 12px !important; }
      .task-card-header > div { width: 100% !important; }
      .task-card-header button { width: 100% !important; justify-content: center !important; margin-top: 8px; }
      textarea { box-sizing: border-box !important; width: 100% !important; }
      .card { 
        position: relative !important; 
        width: 100% !important; 
        left: auto !important; 
        top: auto !important; 
        height: auto !important; 
        padding: 1.25rem !important; 
        margin-bottom: 1.5rem !important;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05) !important;
        transform: none !important;
        background: #ffffff !important;
        border: 1px solid #f0f0f0 !important;
      }
      body { padding: 1rem !important; overflow-y: auto !important; }
    }

    /* Redesigned Task Card Styles - Neon Dark Theme */
    .mentor-task-card {
      background: #111111 !important;
      border: 1px solid rgba(255, 255, 255, 0.05) !important;
      border-left: 6px solid #ceff00 !important;
      border-radius: 16px !important;
      padding: 2rem !important;
      margin-bottom: 2rem !important;
      color: #ffffff !important;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5) !important;
      position: relative;
    }

    .mentor-task-card h3 {
      color: #ffffff !important;
    }

    .task-number-badge {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: #ceff00 !important;
      color: #111111 !important;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .approved-badge-ref {
      border: 1px solid #ceff00 !important;
      color: #ceff00 !important;
      background: rgba(206, 255, 0, 0.05) !important;
      padding: 8px 16px !important;
      border-radius: 8px !important;
      font-size: 0.9rem !important;
      font-weight: 600 !important;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.2s;
      outline: none;
    }
    .approved-badge-ref:hover {
      background: rgba(206, 255, 0, 0.15) !important;
      box-shadow: 0 0 12px rgba(206, 255, 0, 0.15);
    }

    .pending-btn-ref {
      border: 1px solid rgba(255, 255, 255, 0.2) !important;
      color: #ffffff !important;
      background: transparent !important;
      padding: 8px 16px !important;
      border-radius: 8px !important;
      font-size: 0.9rem !important;
      font-weight: 600 !important;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.2s;
      outline: none;
    }
    .pending-btn-ref:hover {
      background: rgba(255, 255, 255, 0.05) !important;
      border-color: rgba(255, 255, 255, 0.4) !important;
    }

    .task-section-title {
      color: #ceff00 !important;
      font-size: 0.85rem !important;
      font-weight: 700 !important;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .task-section-title::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #ceff00;
      border-radius: 50%;
    }

    .submission-content-box {
      background: #181818 !important;
      border: 1px solid #282828 !important;
      border-left: 3px solid #ceff00 !important;
      padding: 16px 18px !important;
      border-radius: 8px !important;
      margin-bottom: 1.5rem !important;
      font-size: 1rem !important;
      color: #e5e7eb !important;
      line-height: 1.6;
    }

    .mentor-note-section-title {
      color: #ffffff !important;
      font-size: 1rem !important;
      font-weight: 700;
      margin-bottom: 12px;
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mentor-note-textarea {
      width: 100% !important;
      min-height: 90px !important;
      padding: 14px !important;
      background: #181818 !important;
      border: 1px solid #282828 !important;
      border-left: 3px solid #ceff00 !important;
      border-radius: 8px !important;
      color: #ffffff !important;
      outline: none !important;
      resize: vertical !important;
      font-family: inherit !important;
      font-size: 0.95rem !important;
      box-sizing: border-box !important;
      transition: all 0.2s;
    }
    .mentor-note-textarea:focus {
      border-color: #ceff00 !important;
      box-shadow: 0 0 8px rgba(206, 255, 0, 0.1);
    }

    .save-note-btn-ref {
      border: 1px solid #ceff00 !important;
      color: #ceff00 !important;
      background: transparent !important;
      padding: 10px 20px !important;
      border-radius: 8px !important;
      font-weight: 700 !important;
      font-size: 0.9rem !important;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
      outline: none;
    }
    .save-note-btn-ref:hover {
      background: rgba(206, 255, 0, 0.1) !important;
      box-shadow: 0 0 10px rgba(206, 255, 0, 0.2);
    }
    
    .summary-card {
      background: #111111;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1.5rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    
    .summary-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .summary-label {
      font-size: 0.85rem;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    
    .summary-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .badge-present { background: #15803d; color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 1rem; }
    .badge-late { background: #b45309; color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 1rem; }
    .badge-absent { background: #dc2626; color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 1rem; }
    .badge-none { background: #333; color: #999; padding: 4px 10px; border-radius: 6px; font-size: 1rem; }
  </style>
</head>
<body>
  <div id="loader" class="loader" style="display: block;">Loading review...</div>

  <div id="appContent" style="display: none;">
    <header class="header container" style="margin-bottom: 2rem; border-bottom: none; display: flex; justify-content: space-between; align-items: center; padding-top: 2rem; flex-wrap: wrap; gap: 1rem;">
      <div class="header-top-row" style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
        <a href="mentor_dashboard.html" style="background: #ffffff; color: #374151; border: 1px solid #d1d5db; padding: 8px 12px; border-radius: 8px; text-decoration: none; display: flex; align-items: center; gap: 6px; font-weight: 600; font-size: 0.9rem; transition: background 0.2s;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Back
        </a>

        <div>
          <h1 id="reviewTitle" style="margin: 0; font-size: 2rem; font-weight: 700; color: #111;">Checklist</h1>
          <p class="header-subtitle-mobile" style="margin: 0; color: #6b7280; font-size: 0.9rem; margin-top: 4px;">Track tasks. Get feedback. Improve every day.</p>
        </div>
      </div>
      <div class="header-actions-mobile" style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
        <a href="https://docs.google.com/spreadsheets/d/1-cBmXM0O0wFD2Z1y5TpsT3lvHQdM0r4D9qd71PykBSo/edit?resourcekey=&gid=1227720073#gid=1227720073" target="_blank" class="btn btn-sm" style="background: #ceff00 !important; color: #000000 !important; border: none !important; display: flex; align-items: center; justify-content: center; padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 0.9rem; text-decoration: none; gap: 6px; transition: all 0.2s;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          View Feedback Responses
        </a>
        <div style="position: relative; flex-grow: 1; min-width: 200px;">
          <input type="text" id="dateChanger" class="date-changer-input" placeholder="Date: Loading...">
          <svg style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #000000; pointer-events: none; z-index: 10;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
      </div>
    </header>

    <main class="container">
      <div id="dailySummaryContainer"></div>
      <div id="tasksContainer"></div>
    </main>
  </div>

  <script src="supabaseClient.js"></script>
  <script src="auth.js"></script>
  <script>
    let mentor = null;
    let studentId = null;
    let reviewDate = null;
    let dailyLog = null;
    let allTasks = [];
    let taskEntries = {};
    let studentAttendance = null;

    async function init() {
      const authData = await requireAuth('mentor');
      if (!authData) return;
      mentor = authData.user;

      const params = new URLSearchParams(window.location.search);
      studentId = params.get('studentId');
      reviewDate = params.get('date');

      if (!studentId || !reviewDate) {
        window.location.href = 'mentor_dashboard.html';
        return;
      }

      const { data: student } = await db.from('profiles').select('full_name').eq('id', studentId).single();
      if (!student) return;

      document.getElementById('reviewTitle').textContent = `Checklist of ${(student.full_name || '').toUpperCase()}`;
      
      const dateInput = document.getElementById('dateChanger');
      flatpickr(dateInput, {
        defaultDate: reviewDate,
        dateFormat: "Y-m-d",
        altInput: true,
        altFormat: "F j, Y",
        disableMobile: true,
        onChange: function(selectedDates, dateStr) {
          if (dateStr && dateStr !== reviewDate) {
            window.location.href = `mentor_review.html?studentId=${studentId}&date=${dateStr}`;
          }
        }
      });

      await loadData();
      renderTasks();

      document.getElementById('loader').style.display = 'none';
      document.getElementById('appContent').style.display = 'block';
    }

    async function loadData() {
      const { data: tasks } = await db.from('tasks').select('*').order('sort_order', { ascending: true });
      allTasks = tasks || [];

      let { data: log } = await db.from('daily_logs')
        .select('*')
        .eq('user_id', studentId)
        .eq('log_date', reviewDate)
        .single();

      if (!log) {
        // No log exists for this date, they haven't started.
        dailyLog = null;
        return;
      }
      dailyLog = log;

      const { data: entries, error } = await db.from('task_entries')
        .select('*, profiles(full_name)')
        .eq('daily_log_id', dailyLog.id);
        
      if (error) {
        console.error("Error loading entries:", error);
      }
      
      (entries || []).forEach(e => {
        taskEntries[e.task_id] = e;
      });

      // Fetch attendance
      const { data: attData, error: attError } = await db.from('attendance')
        .select('*')
        .eq('user_id', studentId)
        .eq('date', reviewDate)
        .single();
        
      if (!attError && attData) {
        studentAttendance = attData;
      } else {
        studentAttendance = null;
      }
    }

    async function toggleApproval(entryId, isCurrentlyApproved) {
      const btn = document.getElementById(`btn-approve-${entryId}`);
      if (btn) btn.disabled = true;

      const newStatus = !isCurrentlyApproved;
      const points = newStatus ? 1 : 0; // Default 1 pt per task for now

      const { error } = await db.from('task_entries').update({
        approved: newStatus,
        points_awarded: points,
        approved_by: mentor.id
      }).eq('id', entryId);

      if (error) {
        alert('Error saving approval: ' + error.message);
        if (btn) btn.disabled = false;
        return;
      }

      // Reload to reflect changes
      await loadData();
      renderTasks();
    }

    async function saveMentorNote(entryId, taskId, btn) {
      const input = document.getElementById(`note-${entryId}`);
      const note = input.value.trim();
      
      if (btn) {
        btn.disabled = true;
        btn.innerHTML = 'Saving...';
      }

      const { error } = await db.from('task_entries').update({
        mentor_note: note || null,
        approved_by: mentor.id
      }).eq('id', entryId);
      
      if (error) {
        alert('Error saving note: ' + error.message);
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = 'Save Note';
        }
        return;
      }
      
      if (btn) {
        const originalBg = btn.style.background;
        const originalColor = btn.style.color;
        const originalBorder = btn.style.border;
        
        btn.innerHTML = '<svg style="margin-right: 6px; width:16px; height:16px; vertical-align:middle;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>Saved!';
        btn.style.background = '#10b981';
        btn.style.color = 'white';
        btn.style.border = '1px solid #10b981';
        
        setTimeout(() => {
          btn.innerHTML = '<svg style="margin-right: 6px; width:16px; height:16px; vertical-align:middle;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Save Note';
          btn.style.background = originalBg;
          btn.style.color = originalColor;
          btn.style.border = originalBorder;
          btn.disabled = false;
        }, 2000);
      }
    }

    function renderTasks() {
      const container = document.getElementById('tasksContainer');
      const summaryContainer = document.getElementById('dailySummaryContainer');
      container.innerHTML = '';
      summaryContainer.innerHTML = '';

      if (!dailyLog) {
        container.innerHTML = '<div class="mentor-task-card" style="text-align:center; padding: 2.5rem !important;"><p style="margin:0; font-size:1.1rem; color:#9ca3af;">Student has not started a diary on this date.</p></div>';
        return;
      }
      
      // Calculate Tasks Done and Points
      let tasksDone = 0;
      let totalPoints = 0;
      Object.values(taskEntries).forEach(entry => {
        if (entry.content && entry.content.trim() !== '') {
          tasksDone++;
        }
        totalPoints += (entry.points_awarded || 0);
      });
      
      // Render Summary Widget
      let attBadge = '<span class="badge-none">Not Marked</span>';
      if (studentAttendance) {
        if (studentAttendance.status === 'present') attBadge = '<span class="badge-present">Present</span>';
        else if (studentAttendance.status === 'late') attBadge = '<span class="badge-late">Late</span>';
        else if (studentAttendance.status === 'absent') attBadge = '<span class="badge-absent">Absent</span>';
      }
      
      summaryContainer.innerHTML = `
        <div class="summary-card">
          <div class="summary-item">
            <span class="summary-label">Attendance</span>
            <span class="summary-value">${attBadge}</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Tasks Completed</span>
            <span class="summary-value" style="color: #ceff00;">${tasksDone} <span style="font-size: 1rem; color: #9ca3af; margin-left: 4px;">/ ${allTasks.length}</span></span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Points Earned</span>
            <span class="summary-value" style="color: #ceff00;">${totalPoints} <span style="font-size: 1rem; color: #9ca3af; margin-left: 4px;">pts</span></span>
          </div>
        </div>
      `;

      allTasks.forEach(task => {
        const entry = taskEntries[task.id];
        
        const card = document.createElement('div');
        card.className = 'mentor-task-card';

        let headerHtml = `
          <div class="task-card-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px;">
            <div style="display: flex; align-items: center; gap: 16px;">
              <div class="task-number-badge">
                ${task.sort_order}
              </div>
              <h3 style="margin: 0; font-size: 1.25rem; font-weight: 700;">${task.title}</h3>
            </div>
          </div>
        `;
        
        let contentHtml = '<p style="color:#9ca3af; font-style:italic; margin-top: 1rem;">No entry submitted yet.</p>';
        let reviewActions = '';

        if (entry && entry.content) {
          const isApproved = entry.approved;
          headerHtml = `
            <div class="task-card-header" style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px;">
              <div style="display: flex; align-items: center; gap: 16px;">
                <div class="task-number-badge">
                  ${task.sort_order}
                </div>
                <h3 style="margin: 0; font-size: 1.25rem; font-weight: 700;">${task.title}</h3>
              </div>
              <div style="text-align: right;">
                <button id="btn-approve-${entry.id}" class="${isApproved ? 'approved-badge-ref' : 'pending-btn-ref'}" onclick="toggleApproval('${entry.id}', ${isApproved})">
                  ${isApproved ? `
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    Approved
                  ` : `
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    Approve Task (+1 Pt)
                  `}
                </button>
                ${isApproved && entry.profiles ? `<div style="font-size: 0.75rem; color: #9ca3af; margin-top: 6px; text-align: right;">by ${entry.profiles.full_name}</div>` : ''}
              </div>
            </div>
          `;

          let extraLogInfo = '';
          const taskTitleClean = (task.title || '').trim().toLowerCase();
          if (taskTitleClean === 'sleep' && dailyLog.sleep_hours) {
            const val = parseFloat(dailyLog.sleep_hours);
            if (!isNaN(val)) {
              const h = Math.floor(val);
              const m = Math.round((val - h) * 60);
              extraLogInfo = ` (Recorded: ${h}h ${m}m)`;
            } else {
              extraLogInfo = ` (Recorded: ${dailyLog.sleep_hours} hrs)`;
            }
          }
          if (taskTitleClean === 'weight' && dailyLog.weight) extraLogInfo = ` (Recorded: ${dailyLog.weight} kg)`;
          if (taskTitleClean === 'eat smart') {
            extraLogInfo = `
              <ul style="font-size:0.9rem; margin-top:8px; padding-left:16px; color:#d1d5db; list-style-type: disc;">
                <li>Breakfast: ${dailyLog.eat_smart_breakfast || '-'}</li>
                <li>Lunch: ${dailyLog.eat_smart_lunch || '-'}</li>
                <li>Tea: ${dailyLog.eat_smart_tea || '-'}</li>
                <li>Dinner: ${dailyLog.eat_smart_dinner || '-'}</li>
                <li>Total Cals: ${dailyLog.total_cals || '-'}</li>
              </ul>
            `;
          }

          // Build dynamic section label
          let sectionLabel = 'Submission Details';
          if (taskTitleClean === 'master the mic') {
            sectionLabel = 'Story Summary';
          } else if (taskTitleClean === 'sleep') {
            sectionLabel = 'Sleep Details';
          } else if (taskTitleClean === 'weight') {
            sectionLabel = 'Weight Log';
          } else if (taskTitleClean === 'eat smart') {
            sectionLabel = 'Diet Log';
          } else {
            sectionLabel = task.title;
          }

          if (entry.content && entry.content.startsWith('data:image/')) {
            contentHtml = `
              <div class="task-section-title">${sectionLabel}</div>
              <div class="submission-content-box" style="text-align: center;">
                <img src="${entry.content}" style="max-width: 100%; border-radius: 8px; border: 1px solid #333; max-height: 400px; object-fit: contain;">
                ${extraLogInfo ? `<p style="margin-top:12px; color:#e5e7eb; font-size:0.95rem;">${extraLogInfo}</p>` : ''}
              </div>
            `;
          } else {
            let displayContent = entry.content;
            if (taskTitleClean === 'sleep') {
              const val = parseFloat(entry.content);
              if (!isNaN(val)) {
                const h = Math.floor(val);
                const m = Math.round((val - h) * 60);
                let parts = [];
                if (h > 0) parts.push(`${h} hour${h > 1 ? 's' : ''}`);
                if (m > 0) parts.push(`${m} minute${m > 1 ? 's' : ''}`);
                if (parts.length === 0) parts.push('0 minutes');
                displayContent = parts.join(' ');
              }
            }
            contentHtml = `
              <div class="task-section-title">${sectionLabel}</div>
              <div class="submission-content-box">
                <p style="margin: 0; white-space: pre-wrap;">${displayContent}${extraLogInfo}</p>
              </div>
            `;
          }

          reviewActions = `
            <div>
              <div class="mentor-note-section-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ceff00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                Mentor Note
              </div>
              <textarea id="note-${entry.id}" class="mentor-note-textarea" placeholder="Provide feedback...">${entry.mentor_note || ''}</textarea>
              <div style="text-align: right; margin-top: 14px;">
                <button class="save-note-btn-ref" onclick="saveMentorNote('${entry.id}', '${task.id}', this)">
                  <svg style="width:16px; height:16px; vertical-align: middle; margin-right: 4px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                  Save Note
                </button>
              </div>
            </div>
          `;
        }

        card.innerHTML = `
          ${headerHtml}
          ${contentHtml}
          ${reviewActions}
        `;

        container.appendChild(card);
      });
    }

    init();
  </script>
</body>
</html>
