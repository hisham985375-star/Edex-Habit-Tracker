<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Edex Habit Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-body">
  <!-- Loading state container -->
  <div id="loadingContainer" class="auth-container premium-shadow text-center">
    <div style="margin-bottom: 16px;"><img src="logo.png" alt="Edex Life School" style="height: 64px; width: auto; filter: invert(1);"></div>
    <h2 style="font-size: 1.5rem; font-weight: 700; color: var(--text-primary);">Verifying Link</h2>
    <p style="color: var(--text-secondary); margin-top: 8px;">Please wait while we verify your password recovery link...</p>
  </div>

  <!-- Global Error Container (if token is invalid/expired) -->
  <div id="globalErrorContainer" class="auth-container premium-shadow text-center" style="display: none;">
    <div style="margin-bottom: 16px;"><img src="logo.png" alt="Edex Life School" style="height: 64px; width: auto; filter: invert(1);"></div>
    <h2 style="font-size: 1.5rem; font-weight: 700; color: #ef4444;">Verification Failed</h2>
    <p id="globalErrorMsg" style="color: var(--text-secondary); margin-top: 8px; margin-bottom: 24px;">The password recovery link is invalid, expired, or has already been used.</p>
    <a href="login.html" id="errorBackBtn" class="btn btn-primary premium-btn" style="display: inline-block; width: auto; padding: 10px 24px !important;">Back to Login</a>
  </div>

  <!-- Reset Password Form Container -->
  <div id="resetContainer" class="auth-container premium-shadow" style="display: none;">
    <div class="text-center mb-4">
      <div style="margin-bottom: 16px;"><img src="logo.png" alt="Edex Life School" style="height: 64px; width: auto; filter: invert(1);"></div>
      <h2 style="font-size: 1.75rem; font-weight: 700; color: var(--text-primary);">New Password</h2>
      <p style="color: var(--text-secondary); margin-top: 4px;">Create a secure new password for your account</p>
    </div>

    <form id="resetForm">
      <div class="form-group" style="position: relative;">
        <label for="password">New Password</label>
        <input type="password" id="password" class="premium-input" required placeholder="At least 6 characters" style="padding-right: 60px !important;">
        <button type="button" onclick="togglePassword('password', this)" style="position: absolute; right: 12px; top: 38px; background: none; border: none; color: #ceff00; font-size: 0.85rem; font-weight: 600; cursor: pointer; padding: 0;">Show</button>
      </div>
      
      <div class="form-group" style="position: relative;">
        <label for="confirmPassword">Confirm New Password</label>
        <input type="password" id="confirmPassword" class="premium-input" required placeholder="Re-enter password" style="padding-right: 60px !important;">
        <button type="button" onclick="togglePassword('confirmPassword', this)" style="position: absolute; right: 12px; top: 38px; background: none; border: none; color: #ceff00; font-size: 0.85rem; font-weight: 600; cursor: pointer; padding: 0;">Show</button>
      </div>

      <div id="errorMsg" class="error-msg" style="padding: 10px; background: #fee2e2; border-radius: 6px; margin-bottom: 12px; display: none; color: #991b1b; font-size: 0.9rem;"></div>
      <div id="successMsg" style="padding: 10px; background: #dcfce7; color: #166534; border-radius: 6px; margin-bottom: 12px; display: none; font-size: 0.9rem;"></div>
      
      <button type="submit" class="btn btn-primary premium-btn mt-4" id="submitBtn">Update Password</button>
    </form>
  </div>

  <script src="supabaseClient.js"></script>
  <script src="auth.js"></script>
  <script>
    let activeSession = null;
    const urlParams = new URLSearchParams(window.location.search);
    const portalParam = urlParams.get('portal') || 'student';

    // Update global back button link dynamically in case error shows
    const errorBackBtn = document.getElementById('errorBackBtn');
    if (portalParam === 'mentor') {
      errorBackBtn.href = 'mentor_login.html';
      errorBackBtn.textContent = 'Back to Mentor Login';
    } else {
      errorBackBtn.href = 'login.html';
      errorBackBtn.textContent = 'Back to Student Login';
    }

    async function checkAuthAndSetup() {
      // Get the session (Supabase automatically detects tokens in hash when client initializes)
      const { data: { session }, error } = await db.auth.getSession();
      
      if (session) {
        activeSession = session;
        showForm();
      } else {
        // Listen to auth changes. Sometimes parsing the recovery token takes a split second.
        const { data: authListener } = db.auth.onAuthStateChange(async (event, newSession) => {
          if (event === 'PASSWORD_RECOVERY' || newSession) {
            activeSession = newSession;
            showForm();
            if (authListener && authListener.subscription) {
              authListener.subscription.unsubscribe();
            }
          }
        });

        // Set a timeout. If no recovery session is parsed after 2.5 seconds, display the error.
        setTimeout(() => {
          if (!activeSession) {
            if (authListener && authListener.subscription) {
              authListener.subscription.unsubscribe();
            }
            showError("Invalid, expired, or missing password recovery link. Please try requesting a new reset link.");
          }
        }, 2500);
      }
    }

    function showForm() {
      document.getElementById('loadingContainer').style.display = 'none';
      document.getElementById('globalErrorContainer').style.display = 'none';
      document.getElementById('resetContainer').style.display = 'block';
    }

    function showError(message) {
      document.getElementById('loadingContainer').style.display = 'none';
      document.getElementById('resetContainer').style.display = 'none';
      document.getElementById('globalErrorMsg').textContent = message;
      document.getElementById('globalErrorContainer').style.display = 'block';
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      const btn = document.getElementById('submitBtn');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      // Basic client-side validation
      if (password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters long.';
        errorMsg.style.display = 'block';
        return;
      }

      if (password !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match.';
        errorMsg.style.display = 'block';
        return;
      }

      btn.textContent = 'Updating...';
      btn.disabled = true;

      // Update password using Supabase Auth
      const { data, error } = await db.auth.updateUser({ password: password });

      if (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = 'block';
        btn.textContent = 'Update Password';
        btn.disabled = false;
      } else {
        successMsg.textContent = 'Success! Your password has been updated. Redirecting you to login...';
        successMsg.style.display = 'block';

        // Check user role to redirect them to the proper login portal
        let targetPortal = portalParam;
        if (activeSession && activeSession.user) {
          const { data: profile } = await db
            .from('profiles')
            .select('role')
            .eq('id', activeSession.user.id)
            .single();
          
          if (profile && profile.role) {
            targetPortal = profile.role;
          }
        }

        // Cleanly sign out current recovery session
        await db.auth.signOut();

        setTimeout(() => {
          if (targetPortal === 'mentor') {
            window.location.href = 'mentor_login.html';
          } else {
            window.location.href = 'login.html';
          }
        }, 2000);
      }
    });

    // Run verification on page load
    checkAuthAndSetup();
  </script>
</body>
</html>
