<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentor Dashboard - Edex Habit Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <style>
    :root {
      --neon-green: #ccff00;
      --dark-card: #111111;
      --bg-page: #f4f5f7;
    }

    body {
      background: var(--bg-page);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .mentor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      border-bottom: none;
      background: var(--dark-card);
      border-radius: 16px;
      margin-top: 1.5rem;
      margin-bottom: 3rem;
      flex-wrap: wrap;
      gap: 1.5rem;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .mentor-avatar {
      width: 56px;
      height: 56px;
      background: var(--neon-green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
    }

    .header-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin: 0 0 4px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-subtitle {
      font-size: 0.9rem;
      color: #9ca3af;
      margin: 0;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn-outline-purple, .btn-outline-blue, .btn-outline-red {
      background: var(--neon-green);
      border: none;
      color: #000;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-outline-purple:hover, .btn-outline-blue:hover, .btn-outline-red:hover {
      background: #b3e600;
    }

    @media (max-width: 768px) {
      .mentor-header {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 1.5rem !important;
      }

      .header-actions {
        width: 100% !important;
        flex-wrap: wrap !important;
        gap: 8px !important;
        justify-content: flex-start !important;
      }

      .header-actions a,
      .header-actions button {
        flex: 1 1 auto !important;
        justify-content: center !important;
        padding: 8px 12px !important;
        font-size: 0.85rem !important;
      }
    }

    .review-card {
      background: var(--dark-card);
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 550px;
      margin: 0 auto;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      position: relative;
      overflow: hidden;
    }

    .review-card::before {
      display: none;
    }

    .review-card-content {
      position: relative;
      z-index: 1;
    }

    .card-header-flex {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 2rem;
    }

    .icon-container {
      width: 48px;
      height: 48px;
      background: #222;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--neon-green);
    }

    .card-title-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin: 0;
    }

    .gradient-line {
      height: 4px;
      width: 48px;
      background: var(--neon-green);
      border-radius: 2px;
    }

    .form-group-custom {
      margin-bottom: 1.5rem;
    }

    .form-label-custom {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #9ca3af;
      margin-bottom: 10px;
    }

    .form-label-custom svg {
      stroke: var(--neon-green);
    }

    .form-input-custom {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #333;
      border-radius: 8px;
      font-size: 1rem;
      color: #fff;
      background: #111;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }

    .form-input-custom:focus {
      border-color: var(--neon-green);
      box-shadow: 0 0 0 3px rgba(204, 255, 0, 0.1);
      background: #111;
    }

    .form-input-custom option {
        background: #111;
        color: #fff;
    }

    .btn-gradient {
      width: 100%;
      background: var(--neon-green);
      color: #000;
      border: none;
      padding: 16px;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 2rem;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn-gradient:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
  </style>
</head>

<body>
  <div id="loader" class="loader" style="display: block;">Loading...</div>

  <div id="appContent" style="display: none;">
    <div class="container" style="max-width: 1100px;">
      <header class="mentor-header">
        <div class="header-left">
          <div class="mentor-avatar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
              <polyline points="10 9 9 9 8 9" />
            </svg>
          </div>
          <div>
            <h1 class="header-title" id="welcomeTitle">Welcome Mentor</h1>
            <p class="header-subtitle">Select a student and date to review</p>
          </div>
        </div>
        <div class="header-actions">
          <a href="leaderboard.html?v=3" class="btn-outline-purple">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M8 21h8M12 17v4M7 4h10M5 4h14c1.1 0 2 .9 2 2v2c0 4.4-3.6 8-8 8s-8-3.6-8-8V6c0-1.1.9-2 2-2z" />
            </svg>
            Leaderboard
          </a>
          <a href="mentor_attendance.html" class="btn-outline-blue">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            Attendance
          </a>
          <button class="btn-outline-red logout-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            Logout
          </button>
        </div>
      </header>

      <main>
        <div class="review-card">
          <!-- Dot pattern top right -->
          <svg style="position:absolute; top:24px; right:24px; opacity:0.3; z-index:0;" width="40" height="40"
            viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <circle cx="2" cy="2" r="1.5" fill="#a855f7" />
            <circle cx="14" cy="2" r="1.5" fill="#a855f7" />
            <circle cx="26" cy="2" r="1.5" fill="#a855f7" />
            <circle cx="38" cy="2" r="1.5" fill="#a855f7" />
            <circle cx="2" cy="14" r="1.5" fill="#a855f7" />
            <circle cx="14" cy="14" r="1.5" fill="#a855f7" />
            <circle cx="26" cy="14" r="1.5" fill="#a855f7" />
            <circle cx="38" cy="14" r="1.5" fill="#a855f7" />
            <circle cx="2" cy="26" r="1.5" fill="#a855f7" />
            <circle cx="14" cy="26" r="1.5" fill="#a855f7" />
            <circle cx="26" cy="26" r="1.5" fill="#a855f7" />
            <circle cx="38" cy="26" r="1.5" fill="#a855f7" />
          </svg>

          <div class="review-card-content">
            <div class="card-header-flex">
              <div class="icon-container">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                  <line x1="16" y1="2" x2="16" y2="6" />
                  <line x1="8" y1="2" x2="8" y2="6" />
                  <line x1="3" y1="10" x2="21" y2="10" />
                  <path d="M8 14h.01" />
                  <path d="M12 14h.01" />
                  <path d="M16 14h.01" />
                  <path d="M8 18h.01" />
                  <path d="M12 18h.01" />
                  <path d="M16 18h.01" />
                </svg>
              </div>
              <div class="card-title-group">
                <h2 class="card-title">Review Student Diary</h2>
                <div style="display:flex; gap:4px; margin-top:2px;">
                  <div class="gradient-line"></div>
                  <div class="gradient-line" style="width:8px;"></div>
                </div>
              </div>
            </div>

            <div class="form-group-custom">
              <label class="form-label-custom">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                  <line x1="16" y1="2" x2="16" y2="6" />
                  <line x1="8" y1="2" x2="8" y2="6" />
                  <line x1="3" y1="10" x2="21" y2="10" />
                </svg>
                Date to Review
              </label>
              <input type="text" id="dateSelect" class="form-input-custom">
            </div>

            <div class="form-group-custom">
              <label class="form-label-custom">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
                Select Student
              </label>
              <select id="studentSelect" class="form-input-custom"
                style="appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2216%22%20height%3D%2216%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23ccff00%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right 16px center;">
                <option value="">Select a student...</option>
                <!-- Rendered by JS -->
              </select>
            </div>

            <button type="button" class="btn-gradient" onclick="window.openReview()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
                <polyline points="10 9 9 9 8 9" />
              </svg>
              Open Review
            </button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="supabaseClient.js"></script>
  <script src="auth.js"></script>
  <script>
    let studentsData = [];

    async function init() {
      const authData = await requireAuth('mentor');
      if (!authData) return;

      const title = document.getElementById('welcomeTitle');
      const name = authData.profile.full_name || '';
      const capName = name ? name.charAt(0).toUpperCase() + name.slice(1) : '';
      title.innerHTML = `Welcome Mentor ${capName}`;

      const dateSelect = document.getElementById('dateSelect');
      const select = document.getElementById('studentSelect');


      flatpickr(dateSelect, {
        defaultDate: new Date(),
        dateFormat: "Y-m-d",
        altInput: true,
        altFormat: "d-m-Y",
        disableMobile: true // Fixes mobile flatpickr UI issues
      });

      const { data: students } = await db.from('profiles').select('*').eq('role', 'student').order('full_name');
      studentsData = students || [];

      if (studentsData.length > 0) {
        studentsData.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = (s.full_name || '').toUpperCase();
          select.appendChild(opt);
        });
      }

      document.getElementById('loader').style.display = 'none';
      document.getElementById('appContent').style.display = 'block';
    }

    window.openReview = function () {
      const dateVal = document.getElementById('dateSelect').value;
      const studentId = document.getElementById('studentSelect').value;

      if (!studentId) {
        alert('Please select a student.');
        return;
      }
      if (!dateVal) {
        alert('Please select a date.');
        return;
      }

      window.location.href = `mentor_review.html?studentId=${studentId}&date=${dateVal}`;
    }

    init();
  </script>
  <style>
    @keyframes wave {
      0% {
        transform: rotate(0deg);
      }

      10% {
        transform: rotate(14deg);
      }

      20% {
        transform: rotate(-8deg);
      }

      30% {
        transform: rotate(14deg);
      }

      40% {
        transform: rotate(-4deg);
      }

      50% {
        transform: rotate(10deg);
      }

      60% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(0deg);
      }
    }
  </style>
</body>

</html>

</html>
