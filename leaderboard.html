<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard - Edex Habit Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --neon-green: #ccff00;
      --dark-card: #111111;
      --bg-page: #f4f5f7;
    }
    body {
      background: var(--bg-page) !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .mentor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      background: var(--dark-card) !important;
      border-radius: 16px;
      margin-top: 1.5rem;
      margin-bottom: 3rem;
      flex-wrap: wrap;
      gap: 1.5rem;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .mentor-avatar {
      width: 56px;
      height: 56px;
      background: var(--neon-green) !important;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000 !important;
    }
    .header-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin: 0 0 4px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-subtitle {
      font-size: 0.9rem;
      color: #9ca3af;
      margin: 0;
    }
    .btn-outline-purple {
      background: var(--neon-green);
      border: none;
      color: #000;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-outline-purple:hover {
      background: #b3e600;
    }
    .review-card {
      background: var(--dark-card) !important;
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 650px;
      margin: 0 auto;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      position: relative;
      overflow: hidden;
    }
    .review-card::before { display: none; }
    .review-card-content { position: relative; z-index: 1; }
    
    .card-title-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .card-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff !important;
      margin: 0;
    }
    .gradient-line {
      height: 4px;
      width: 48px;
      background: var(--neon-green);
      border-radius: 2px;
    }
    /* Table styles */
    .table {
      width: 100%;
      border-collapse: collapse;
    }
    .table th {
      background: #1a1a1a !important;
      border-bottom: none !important;
      color: var(--neon-green) !important;
      padding: 16px 12px;
      font-weight: 600;
      text-align: left;
    }
    .table th:first-child {
      border-top-left-radius: 8px;
      border-bottom-left-radius: 8px;
    }
    .table th:last-child {
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
    }
    .table td {
      padding: 16px 12px;
      border-bottom: 1px solid #222;
      color: #fff;
    }
    
    .seg-btn {
      padding: 8px 16px; border: none; border-radius: 8px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; background: transparent; color: #fff;
    }
    .rankings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
    }
    .seg-container {
      display: flex;
      background: #1a1a1a;
      padding: 4px;
      border-radius: 12px;
      gap: 4px;
      border: 1px solid #333;
    }
    @media (max-width: 768px) {
      .review-card {
        padding: 1.5rem;
      }
      .rankings-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1.5rem;
      }
      .seg-container {
        width: 100%;
        justify-content: space-between;
      }
      .seg-btn {
        flex: 1;
        text-align: center;
        padding: 8px 4px;
        font-size: 0.85rem;
      }
      .table th, .table td {
        padding: 12px 8px;
        font-size: 0.9rem;
      }
      #winnerBanner {
        padding: 20px !important;
      }
      .mentor-header {
        padding: 1.5rem 1rem;
      }
    }
  </style>
</head>
<body>
  <div id="loader" class="loader" style="display: block;">Loading leaderboard...</div>

  <div id="appContent" style="display: none;">
    <div class="container" style="max-width: 1100px;">
      <header class="mentor-header">
        <div class="header-left">
          <div class="mentor-avatar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </div>
          <div>
            <h1 class="header-title">Leaderboard</h1>
            <p class="header-subtitle">Top performers and points</p>
          </div>
        </div>
        <div class="header-actions">
          <a href="#" id="backBtn" class="btn-outline-purple">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
            Back
          </a>
        </div>
      </header>

      <main>
        <div class="review-card">
          <svg style="position:absolute; top:24px; right:24px; opacity:0.3; z-index:0;" width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <circle cx="2" cy="2" r="1.5" fill="#a855f7"/><circle cx="14" cy="2" r="1.5" fill="#a855f7"/><circle cx="26" cy="2" r="1.5" fill="#a855f7"/><circle cx="38" cy="2" r="1.5" fill="#a855f7"/>
            <circle cx="2" cy="14" r="1.5" fill="#a855f7"/><circle cx="14" cy="14" r="1.5" fill="#a855f7"/><circle cx="26" cy="14" r="1.5" fill="#a855f7"/><circle cx="38" cy="14" r="1.5" fill="#a855f7"/>
            <circle cx="2" cy="26" r="1.5" fill="#a855f7"/><circle cx="14" cy="26" r="1.5" fill="#a855f7"/><circle cx="26" cy="26" r="1.5" fill="#a855f7"/><circle cx="38" cy="26" r="1.5" fill="#a855f7"/>
          </svg>

          <div class="review-card-content">
            
            <div class="rankings-header">
              <div class="card-title-group">
                <h2 class="card-title">Rankings</h2>
                <div class="gradient-line"></div>
              </div>
              
              <div class="seg-container">
                <button class="seg-btn" id="btnDaily" onclick="setFilter('daily')">Daily</button>
                <button class="seg-btn" id="btnWeekly" onclick="setFilter('weekly')">Weekly</button>
                <button class="seg-btn" id="btnMonthly" onclick="setFilter('monthly')">Monthly</button>
              </div>
            </div>

            <div id="winnerBanner" style="display: none; background: #111; border: 1px solid #ccff00; border-radius: 16px; padding: 32px; text-align: center; margin-bottom: 32px; position: relative; z-index: 1; box-shadow: 0 10px 25px rgba(204, 255, 0, 0.1);">
              <div style="margin-bottom: 12px; display: flex; justify-content: center;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccff00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="2 20 22 20 19 6 15 12 12 4 9 12 5 6 2 20"></polygon>
                  <circle cx="12" cy="2" r="1" fill="#ccff00" stroke="none"></circle>
                  <circle cx="5" cy="4" r="1" fill="#ccff00" stroke="none"></circle>
                  <circle cx="19" cy="4" r="1" fill="#ccff00" stroke="none"></circle>
                </svg>
              </div>
              <h2 style="color: #fff; margin-bottom: 8px; font-size: 1.8rem; font-weight: 800;" id="winnerText">Winner!</h2>
              <p style="font-size: 1.2rem; font-weight: 600; color: #ccff00; margin: 0;" id="winnerSub"></p>
            </div>

            <table class="table" style="position: relative; z-index: 1; margin-top: 10px;">
              <thead>
                <tr>
                  <th>Rank</th>
                  <th>Student</th>
                  <th style="text-align: right;">Points</th>
                </tr>
              </thead>
              <tbody id="leaderboardBody">
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="supabaseClient.js"></script>
  <script src="auth.js"></script>
  <script>
    let currentFilter = 'daily';
    let isMentor = false;

    async function init() {
      // Check auth but don't strictly require a specific role, just any valid user
      const { data: { session } } = await db.auth.getSession();
      if (!session) {
        window.location.href = 'index.html';
        return;
      }
      
      const { data: profile } = await db.from('profiles').select('role').eq('id', session.user.id).single();
      isMentor = profile?.role === 'mentor';
      document.getElementById('backBtn').href = isMentor ? 'mentor_dashboard.html' : 'dashboard.html';

      setFilter('daily');
      
      document.getElementById('loader').style.display = 'none';
      document.getElementById('appContent').style.display = 'block';
    }

    async function setFilter(filter) {
      currentFilter = filter;
      
      // Update buttons
      ['Daily', 'Weekly', 'Monthly'].forEach(f => {
        const btn = document.getElementById('btn' + f);
        if (f.toLowerCase() === filter) {
          btn.style.background = '#ccff00';
          btn.style.color = '#000';
          btn.style.boxShadow = 'none';
        } else {
          btn.style.background = 'transparent';
          btn.style.color = '#fff';
          btn.style.boxShadow = 'none';
        }
      });

      const now = new Date();
      let startDate = new Date();
      let endDate = new Date();
      
      if (filter === 'daily') {
        startDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        endDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999);
      } else if (filter === 'weekly') {
        const day = now.getDay();
        const diff = now.getDate() - day + (day === 0 ? -6 : 1);
        startDate = new Date(now.setDate(diff));
        startDate.setHours(0, 0, 0, 0);
        endDate = new Date(startDate);
        endDate.setDate(startDate.getDate() + 6);
        endDate.setHours(23, 59, 59, 999);
      } else if (filter === 'monthly') {
        startDate = new Date(now.getFullYear(), now.getMonth(), 1);
        endDate = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59, 999);
      }

      const startStr = startDate.toISOString().split('T')[0];
      const endStr = endDate.toISOString().split('T')[0];

      // Fetch leaderboard using the RPC function that bypasses RLS
      const { data: entries, error } = await db.rpc('get_leaderboard', { 
        start_date: startStr, 
        end_date: endStr 
      });

      if (error) {
        console.error("Error fetching leaderboard:", error);
      }

      const leaderboard = (entries || []).map(e => ({
        name: e.full_name,
        points: parseInt(e.total_points, 10)
      }));

      renderLeaderboard(leaderboard);
    }

    function renderLeaderboard(leaderboard) {
      const tbody = document.getElementById('leaderboardBody');
      const banner = document.getElementById('winnerBanner');
      
      tbody.innerHTML = '';
      
      if (leaderboard.length === 0) {
        banner.style.display = 'none';
        tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; padding: 32px; color: var(--text-secondary);">No points awarded yet for this period.</td></tr>`;
        return;
      }

      // Winner
      const winner = leaderboard[0];
      banner.style.display = 'block';
      document.getElementById('winnerText').textContent = `Winner of the ${currentFilter.charAt(0).toUpperCase() + currentFilter.slice(1)}!`;
      document.getElementById('winnerSub').textContent = `${winner.name} — ${winner.points} points`;

      leaderboard.forEach((student, idx) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="color: #fff; font-weight: 500;">#${idx + 1}</td>
          <td style="color: #fff; font-weight: 600;">${student.name}</td>
          <td style="color: #fff; text-align: right; font-weight: 600;">${student.points} pt</td>
        `;
        tbody.appendChild(tr);
      });
    }

    init();
  </script>
</body>
</html>
